<!DOCTYPE html>
<html>
<body>
    <h1>لوحة تحكم المدير</h1>
    <div id="pending-list">جاري تحميل الطلبات...</div>

    <script>
        fetch('/api/admin/pending')
            .then(res => res.json())
            .then(data => {
                let html = '';
                if (data.length === 0) {
                    html = "لا توجد طلبات معلقة.";
                } else {
                    data.forEach(item => {
                        html += `<div>عملية رقم ${item.req_id} - مبلغ: ${item.amount} 
                        <button onclick="approve(${item.req_id})">موافقة</button></div>`;
                    });
                }
                document.getElementById('pending-list').innerHTML = html;
            });

        function approve(id) {
            fetch('/api/admin/approve', {
                method: 'POST',
                headers: {'Content-Type': 'application/json'},
                body: JSON.stringify({req_id: id, action: 'approve'})
            }).then(() => {
                alert("تمت الموافقة!");
                location.reload();
            });
        }
    </script>
</body>
</html>
